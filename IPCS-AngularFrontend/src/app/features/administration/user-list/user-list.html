<div class="user-admin-container animate-fade-in">
  <!-- Page Header -->
  <div class="page-header">
    <div class="title-section">
      <h1>User Management</h1>
      <p>Manage staff accounts, branches, and security roles.</p>
    </div>
    <div class="action-section">
      <button class="btn btn-primary" routerLink="/dashboard/administration/users/new">
        <span class="icon">+</span> Create New User
      </button>
    </div>
  </div>

  <!-- Users Table Card -->
  <div class="card table-card">
    <div *ngIf="isLoading" class="loading-state">
      <div class="spinner-blue"></div>
      <p>Fetching staff list...</p>
    </div>

    <table *ngIf="!isLoading" class="data-table">
      <thead>
        <tr>
          <th>Full Name</th>
          <th>Username</th>
          <th>Email</th>
          <th>Role</th>
          <th>Branch</th>
          <th class="text-right">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let user of users">
          <td>
            <div class="user-cell">
              <div class="avatar">{{ user.name.charAt(0) }}</div>
              <strong>{{ user.name }}</strong>
            </div>
          </td>
          <td>{{ user.userName }}</td>
          <td>{{ user.email }}</td>
          <td>
            <span class="role-badge" [ngClass]="user.roles[0]?.toLowerCase()">
              {{ user.roles.join(', ') || 'No Role' }}
            </span>
          </td>
          <td>{{ user.branchName || 'Main Center' }}</td>
          <td class="text-right">
            <div class="action-buttons">
              <!-- Edit User Button -->
              <button class="icon-btn edit" title="Edit User">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
              </button>
              <!-- Delete User Button (Cannot delete self) -->
              <button class="icon-btn delete" (click)="deleteUser(user.userId)" title="Delete Account">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
              </button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<style>
  /* 
    User Management Specific Styles (CSS)
    Styling for the personnel management module.
  */
  .user-admin-container { padding-bottom: 40px; }
  .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }

  .user-cell { display: flex; align-items: center; gap: 12px; }
  .avatar { width: 32px; height: 32px; background: var(--primary-light); color: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; }

  .role-badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; background: #f1f5f9; color: #64748b; }
  .role-badge.admin { background: #fee2e2; color: #ef4444; }
  .role-badge.manager { background: #e0f2fe; color: #0369a1; }

  .text-right { text-align: right; }
  .action-buttons { display: flex; gap: 8px; justify-content: flex-end; }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
