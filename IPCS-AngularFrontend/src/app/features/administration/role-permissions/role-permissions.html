<div class="container animate-fade-in setup-container">
  <!-- Page Header -->
  <div class="page-header" style="margin-bottom: 32px;">
    <div style="display: flex; align-items: center; gap: 20px;">
      <button class="icon-btn" routerLink="/dashboard/administration/roles" title="Back to Roles">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
      </button>
      <div>
        <h1>Granular Permissions</h1>
        <p>Define precise access control for this role across all system modules.</p>
      </div>
    </div>
    <div class="actions">
      <button class="btn btn-primary" (click)="savePermissions()" [disabled]="isLoading">
        <span *ngIf="!isLoading">Save Configuration</span>
        <span *ngIf="isLoading" class="spinner"></span>
      </button>
    </div>
  </div>

  <!-- Error Message Display -->
  <div *ngIf="errorMessage" class="error-alert animate-shake" style="margin-bottom: 24px; padding: 16px; background: #fff1f2; border-left: 4px solid #e11d48; border-radius: 8px; color: #9f1239; display: flex; align-items: center; gap: 12px;">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
    <span>{{ errorMessage }}</span>
  </div>

  <!-- Loading State -->
  <div *ngIf="isLoading" style="padding: 100px; text-align: center;">
    <div class="spinner" style="border-top-color: var(--primary); border-width: 4px; width: 48px; height: 48px; margin: 0 auto;"></div>
  </div>

  <!-- Permissions Matrix Grid -->
  <div class="permissions-matrix" *ngIf="!isLoading">
    <div *ngFor="let module of modules" class="card module-card">
      <div class="module-header">
        <div style="display: flex; align-items: center; gap: 12px;">
          <div class="module-dot"></div>
          <h3>{{ module.moduleName }}</h3>
        </div>
        <div class="toggle-container">
          <span style="font-size: 11px; font-weight: 700; color: var(--text-muted);">ALL</span>
          <label class="switch">
            <input type="checkbox" (change)="toggleModule(module, $any($event.target).checked)">
            <span class="slider round"></span>
          </label>
        </div>
      </div>
      
      <div class="permissions-list">
        <div *ngFor="let perm of module.permissions" class="perm-row">
          <label class="check-container">
            <input type="checkbox" [(ngModel)]="perm.isSelected">
            <span class="checkmark"></span>
            <div class="perm-info">
              <span class="perm-name">{{ perm.displayName }}</span>
              <span class="perm-key">{{ perm.permissionKey }}</span>
            </div>
          </label>
        </div>
      </div>
    </div>
  </div>
</div>

<style>
  .permissions-matrix { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; }
  .module-card { padding: 0; overflow: hidden; border-top: 4px solid var(--primary); }
  .module-header { padding: 16px 20px; background: #f8fafc; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; }
  .module-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--primary); }
  .module-header h3 { font-size: 14px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-main); }

  .permissions-list { padding: 8px 0; }
  .perm-row { padding: 12px 20px; transition: background 0.2s; }
  .perm-row:hover { background: #fcfdfe; }
  
  .check-container { display: flex; align-items: flex-start; gap: 14px; cursor: pointer; }
  .perm-info { display: flex; flex-direction: column; gap: 2px; }
  .perm-name { font-size: 14px; font-weight: 600; color: var(--text-main); }
  .perm-key { font-size: 10px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }

  /* Custom Checkbox */
  .checkmark { width: 20px; height: 20px; border: 2px solid #cbd5e1; border-radius: 6px; flex-shrink: 0; position: relative; transition: all 0.2s; }
  input:checked + .checkmark { background: var(--primary); border-color: var(--primary); }
  .checkmark:after { content: ''; position: absolute; left: 6px; top: 2px; width: 5px; height: 10px; border: solid white; border-width: 0 2.5px 2.5px 0; transform: rotate(45deg); display: none; }
  input:checked + .checkmark:after { display: block; }

  /* Switch */
  .switch { position: relative; display: inline-block; width: 34px; height: 18px; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #e2e8f0; transition: .4s; border-radius: 20px; }
  .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
  input:checked + .slider { background-color: var(--primary); }
  input:checked + .slider:before { transform: translateX(16px); }

  .toggle-container { display: flex; align-items: center; gap: 8px; }

  .animate-shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
  @keyframes shake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-4px, 0, 0); } 40%, 60% { transform: translate3d(4px, 0, 0); } }
</style>
