<div class="permissions-container animate-fade-in">
  <!-- Page Header -->
  <div class="page-header">
    <div class="title-section">
      <button class="back-btn" routerLink="/dashboard/administration/roles">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
      </button>
      <h1>Role Permissions</h1>
      <p>Configure access levels for the selected role.</p>
    </div>
    <div class="actions">
      <button class="btn btn-primary" (click)="savePermissions()" [disabled]="isLoading">
        <span *ngIf="!isLoading">Save Changes</span>
        <span *ngIf="isLoading" class="spinner"></span>
      </button>
    </div>
  </div>

  <!-- Loading State -->
  <div *ngIf="isLoading" class="loading-full">
    <div class="spinner-blue"></div>
  </div>

  <!-- Permissions Matrix Grid -->
  <div class="modules-grid" *ngIf="!isLoading">
    <div *ngFor="let module of modules" class="card module-card">
      <div class="module-header">
        <h3>{{ module.moduleName }}</h3>
        <!-- Checkbox to toggle all permissions in this module -->
        <label class="toggle-switch">
          <input type="checkbox" (change)="toggleModule(module, $any($event.target).checked)">
          <span class="slider round"></span>
        </label>
      </div>
      
      <div class="permissions-list">
        <div *ngFor="let perm of module.permissions" class="perm-item">
          <label class="checkbox-container">
            <input type="checkbox" [(ngModel)]="perm.isSelected">
            <span class="checkmark"></span>
            {{ perm.permissionName }}
          </label>
          <small class="perm-key">{{ perm.permissionKey }}</small>
        </div>
      </div>
    </div>
  </div>
</div>

<style>
  /* 
    Role Permissions Specific Styles (CSS)
    Matrix layout for fine-grained access control.
  */
  .permissions-container { padding-bottom: 60px; }
  .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
  .title-section { display: flex; align-items: center; gap: 16px; }

  /* Grid of modules, 3 per row on large screens */
  .modules-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 24px; }
  
  .module-card { padding: 0; overflow: hidden; border-top: 4px solid var(--primary); }
  .module-header { padding: 16px 20px; background: #f8fafc; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; }
  .module-header h3 { font-size: 16px; font-weight: 700; color: var(--primary); }

  .permissions-list { padding: 12px 20px; }
  .perm-item { padding: 10px 0; border-bottom: 1px solid #f8fafc; display: flex; flex-direction: column; gap: 2px; }
  .perm-item:last-child { border-bottom: none; }
  
  .perm-key { font-size: 10px; color: var(--text-muted); font-family: monospace; }

  /* Checkbox styling */
  .checkbox-container { display: flex; align-items: center; gap: 10px; font-size: 14px; cursor: pointer; }
  
  /* Toggle Switch for Module-level toggle */
  .toggle-switch { position: relative; display: inline-block; width: 40px; height: 20px; }
  .toggle-switch input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #cbd5e1; transition: .4s; border-radius: 20px; }
  .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 2px; bottom: 2px; background-color: white; transition: .4s; border-radius: 50%; }
  input:checked + .slider { background-color: var(--primary); }
  input:checked + .slider:before { transform: translateX(20px); }

  .loading-full { padding: 100px; text-align: center; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
