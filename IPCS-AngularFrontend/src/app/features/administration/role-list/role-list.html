<div class="admin-container animate-fade-in">
  <!-- Page Header -->
  <div class="page-header">
    <div class="title-section">
      <h1>Role Management</h1>
      <p>Manage system access levels and assign permissions to roles.</p>
    </div>
  </div>

  <div class="admin-grid">
    <!-- Left: Role Creation Form -->
    <div class="card form-card">
      <h3>Create New Role</h3>
      <div class="input-group">
        <label>Role Name *</label>
        <input type="text" [(ngModel)]="newRoleName" placeholder="e.g. SalesManager">
      </div>
      <button class="btn btn-primary w-full" (click)="createRole()" [disabled]="isLoading">
        <span *ngIf="!isLoading">Create Role</span>
        <span *ngIf="isLoading" class="spinner"></span>
      </button>
    </div>

    <!-- Right: Roles List Table -->
    <div class="card table-card">
      <div *ngIf="isLoading" class="loading-state">
        <div class="spinner-blue"></div>
      </div>

      <table *ngIf="!isLoading" class="data-table">
        <thead>
          <tr>
            <th>Role Name</th>
            <th class="text-right">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let role of roles">
            <td><strong>{{ role.name }}</strong></td>
            <td class="text-right">
              <div class="action-buttons">
                <!-- Manage Permissions Button -->
                <button 
                  class="btn btn-secondary btn-sm" 
                  [routerLink]="['/dashboard/administration/role-permissions', role.id]"
                >
                  Manage Permissions
                </button>
                <!-- Delete Role Button (Admin role cannot be deleted typically) -->
                <button 
                  *ngIf="role.name !== 'Admin'"
                  class="icon-btn delete" 
                  (click)="deleteRole(role.id)"
                  title="Delete Role"
                >
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<style>
  /* 
    Role Management Specific Styles (CSS)
    Administration layout for role and permission control.
  */
  .admin-container { padding-bottom: 40px; }
  .page-header { margin-bottom: 32px; }
  
  .admin-grid { display: grid; grid-template-columns: 340px 1fr; gap: 24px; }
  .form-card { padding: 24px; height: fit-content; }
  .form-card h3 { font-size: 18px; margin-bottom: 20px; color: var(--primary); }
  
  .w-full { width: 100%; }
  .btn-sm { font-size: 12px; padding: 6px 12px; }

  .text-right { text-align: right; }
  .action-buttons { display: flex; gap: 12px; justify-content: flex-end; align-items: center; }

  .icon-btn.delete:hover { background: #fef2f2; color: #ef4444; border-color: #ef4444; }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
