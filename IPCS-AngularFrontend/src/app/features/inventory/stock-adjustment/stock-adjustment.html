<div class="adjustment-container animate-fade-in">
  <!-- Page Header -->
  <div class="page-header">
    <div class="title-section">
      <h1>Stock Adjustment</h1>
      <p>Record stock corrections for damaged, lost, or expired items.</p>
    </div>
  </div>

  <div class="card form-card">
    <form (ngSubmit)="onSubmit()" #adjForm="ngForm">
      <div class="form-grid">
        <!-- Product Selection -->
        <div class="input-group full-width">
          <label>Select Medicine *</label>
          <select [(ngModel)]="adjustment.productId" name="productId" required>
            <option [value]="null" disabled>-- Select Medicine --</option>
            <option *ngFor="let p of products" [value]="p.productId">
              {{ p.productName }} (SKU: {{ p.sku }}) - Stock: {{ p.currentStock }}
            </option>
          </select>
        </div>

        <!-- Adjustment Details -->
        <div class="input-group">
          <label>Adjustment Type *</label>
          <select [(ngModel)]="adjustment.adjustmentType" name="type" required>
            <option value="Damage">Damage</option>
            <option value="Loss">Loss</option>
            <option value="Correction">Manual Correction</option>
            <option value="Expired">Expired</option>
          </select>
        </div>

        <div class="input-group">
          <label>Quantity to Deduct *</label>
          <input type="number" [(ngModel)]="adjustment.quantity" name="qty" required min="1">
        </div>

        <div class="input-group full-width">
          <label>Remarks / Reason *</label>
          <textarea [(ngModel)]="adjustment.remarks" name="remarks" required placeholder="Describe why this adjustment is being made..."></textarea>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-secondary" routerLink="/dashboard/inventory/ledger">Cancel</button>
        <button type="submit" class="btn btn-primary" [disabled]="!adjForm.valid || isLoading">
          <span *ngIf="!isLoading">Save Adjustment</span>
          <span *ngIf="isLoading" class="spinner"></span>
        </button>
      </div>
    </form>
  </div>
</div>

<style>
  .adjustment-container { padding-bottom: 40px; }
  .form-card { padding: 32px; max-width: 800px; margin: 0 auto; }
  
  .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; margin-bottom: 32px; }
  .full-width { grid-column: span 2; }

  textarea { width: 100%; height: 100px; padding: 12px; border-radius: 8px; border: 1px solid #e2e8f0; outline: none; font-family: inherit; }
  .form-actions { display: flex; justify-content: flex-end; gap: 16px; border-top: 1px solid #f1f5f9; padding-top: 24px; }
</style>
