<div class="app-layout" [class.sidebar-collapsed]="!isSidebarOpen" [class.sidebar-mobile-open]="isSidebarOpen">
  <!-- Sidebar -->
  <aside class="sidebar glass">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-box">IP</div>
        <span class="logo-text" *ngIf="isSidebarOpen">PharmaCare</span>
      </div>
      <button class="toggle-btn" (click)="toggleSidebar()">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
      </button>
    </div>

    <nav class="sidebar-nav">
      <div *ngFor="let group of filteredGroups" class="nav-group">
        <div class="group-title" *ngIf="isSidebarOpen">{{ group.title }}</div>
        <ul class="nav-list">
          <li *ngFor="let item of group.items">
            <a [routerLink]="item.route" [class.active]="isLinkActive(item.route)" class="nav-link">
              <span class="icon-wrapper">
                <!-- Dynamic Icons Based on item.icon -->
                <svg *ngIf="item.icon === 'grid'" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                <svg *ngIf="item.icon === 'package'" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
                <svg *ngIf="item.icon === 'shopping-cart'" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                <svg *ngIf="item.icon === 'truck'" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13"></rect><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon><circle cx="5.5" cy="18.5" r="2.5"></circle><circle cx="18.5" cy="18.5" r="2.5"></circle></svg>
                <svg *ngIf="item.icon === 'list'" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
                <svg *ngIf="item.icon === 'layers'" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
                <svg *ngIf="item.icon === 'rotate-ccw'" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>
                <svg *ngIf="item.icon === 'repeat'" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"></polyline><path d="M3 11V9a4 4 0 0 1 4-4h14"></path><polyline points="7 23 3 19 7 15"></polyline><path d="M21 13v2a4 4 0 0 1-4 4H3"></path></svg>
                <svg *ngIf="item.icon === 'bar-chart-2'" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
                <svg *ngIf="item.icon === 'users' || item.icon === 'user-plus'" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                <svg *ngIf="item.icon === 'shield'" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                <svg *ngIf="item.icon === 'map-pin' || item.icon === 'map'" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                <svg *ngIf="item.icon === 'settings'" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                <svg *ngIf="item.icon === 'briefcase'" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg>
                <svg *ngIf="item.icon === 'credit-card'" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect><line x1="1" y1="10" x2="23" y2="10"></line></svg>
                <svg *ngIf="item.icon === 'sliders'" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="4" y1="21" x2="4" y2="14"></line>
                  <line x1="4" y1="10" x2="4" y2="3"></line>
                  <line x1="12" y1="21" x2="12" y2="12"></line>
                  <line x1="12" y1="8" x2="12" y2="3"></line>
                  <line x1="20" y1="21" x2="20" y2="16"></line>
                  <line x1="20" y1="12" x2="20" y2="3"></line>
                  <polyline points="1 4 4 1 7 4"></polyline>
                  <polyline points="9 12 12 9 15 12"></polyline>
                  <polyline points="17 20 20 17 23 20"></polyline>
                </svg>
                <svg *ngIf="item.icon === 'alert-triangle'" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                  <line x1="12" y1="9" x2="12" y2="13"/>
                  <line x1="12" y1="17" x2="12.01" y2="17"/>
                </svg>
                <svg *ngIf="item.icon === 'refresh-cw'" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="23 4 23 10 17 10"/>
                  <polyline points="1 20 1 14 7 14"/>
                  <path d="M3.51 9a9 9 0 0 1 14.37-3.36L23 10"/>
                  <path d="M20.49 15a9 9 0 0 1-14.37 3.36L1 14"/>
                </svg>
                <svg *ngIf="item.icon === 'globe'" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="10"/>
                  <line x1="2" y1="12" x2="22" y2="12"/>
                  <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                </svg>
                <svg *ngIf="item.icon === 'file-text'" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
              </span>
              <span class="nav-text" *ngIf="isSidebarOpen">{{ item.name }}</span>
            </a>
          </li>
        </ul>
      </div>
    </nav>
  </aside>

  <!-- Main Content Area -->
  <main class="main-content">
    <header class="top-header glass">
      <div class="header-left">
        <button class="mobile-toggle-btn" (click)="toggleSidebar()">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
        <div class="search-bar">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          <input type="text" placeholder="Global Search...">
        </div>
      </div>
      <div class="header-right">
        <div class="user-profile">
          <div class="user-info text-right">
            <div class="user-name">{{ currentUser.name }}</div>
            <div class="user-role">{{ currentUser.role }}</div>
          </div>
          <div class="avatar" (click)="logout()">
            {{ currentUser.name.charAt(0) }}
          </div>
        </div>
      </div>
    </header>

    <div class="page-container">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>

<style>
  .app-layout { display: flex; min-height: 100vh; background: #f8fafc; }
  
  /* Sidebar Styles */
  .sidebar {
    width: var(--sidebar-width);
    height: 100vh;
    position: fixed;
    left: 0; top: 0;
    z-index: 100;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    flex-direction: column;
    border-right: 1px solid rgba(226, 232, 240, 0.8);
    background: white;
  }
  
  .sidebar-collapsed .sidebar { width: 80px; }
  
  .sidebar-header {
    height: var(--header-height);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #f1f5f9;
  }
  
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-box {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    border-radius: 10px;
    color: white;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 18px;
  }
  .logo-text { font-weight: 700; font-size: 20px; color: var(--primary); }
  
  .toggle-btn {
    background: none; border: none; cursor: pointer; color: var(--text-muted);
    padding: 8px; border-radius: 8px; transition: all 0.2s;
  }
  .toggle-btn:hover { background: #f1f5f9; color: var(--primary); }
  
  .sidebar-nav { flex: 1; overflow-y: auto; padding: 20px 0; }
  .nav-group { margin-bottom: 24px; }
  .group-title {
    padding: 0 24px; font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--text-muted); margin-bottom: 12px;
  }
  
  .nav-list { list-style: none; }
  .nav-link {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 24px; color: var(--text-muted);
    text-decoration: none; transition: all 0.2s;
    font-weight: 500; font-size: 15px;
    position: relative;
  }
  
  .nav-link:hover { color: var(--primary); background: #f0fdfa; }
  .nav-link.active {
    color: var(--primary);
    background: #f0fdfa;
    font-weight: 600;
  }
  .nav-link.active::before {
    content: ''; position: absolute; left: 0; top: 10%; bottom: 10%;
    width: 4px; background: var(--primary); border-radius: 0 4px 4px 0;
  }
  
  .icon-wrapper { width: 24px; display: flex; justify-content: center; }
  
  /* Main Content Area */
  .main-content {
    flex: 1;
    margin-left: var(--sidebar-width);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    flex-direction: column;
    min-width: 0; /* Allow flex to shrink below content size */
  }
  .sidebar-collapsed .main-content { margin-left: 80px; }
  
  .top-header {
    height: var(--header-height);
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 90;
    background: rgba(255, 255, 255, 0.8);
  }
  
  .search-bar {
    display: flex; align-items: center; gap: 12px;
    background: #f1f5f9; padding: 10px 16px;
    border-radius: 12px; width: 100%; max-width: 350px;
    color: var(--text-muted); border: 1px solid transparent;
    transition: all 0.2s;
  }
  .search-bar:focus-within { background: white; border-color: var(--primary); box-shadow: var(--shadow-sm); }
  .search-bar input { background: none; border: none; outline: none; width: 100%; font-size: 14px; }
  
  .user-profile { display: flex; align-items: center; gap: 16px; }
  .user-name { font-weight: 600; font-size: 14px; }
  .user-role { font-size: 12px; color: var(--text-muted); }
  
  .avatar {
    width: 40px; height: 40px;
    background: var(--primary); color: white;
    border-radius: 50%; display: flex;
    align-items: center; justify-content: center;
    font-weight: 700; cursor: pointer;
    box-shadow: 0 4px 12px rgba(15, 118, 110, 0.3);
    transition: transform 0.2s;
  }
  .avatar:hover { transform: scale(1.1); }
  
  .page-container { 
    padding: 32px; 
    flex: 1; 
    overflow-x: auto; /* Allow horizontal scrolling for large tables */
    width: 100%;
  }
  
  .text-right { text-align: right; }
  
  @media (max-width: 768px) {
    .sidebar { 
      transform: translateX(-100%); 
      position: fixed;
      width: 280px !important;
      z-index: 1000;
    }
    .sidebar-mobile-open .sidebar { 
      transform: translateX(0); 
      box-shadow: 0 0 20px rgba(0,0,0,0.2);
    }
    /* Ensure text is shown when sidebar is explicitly toggled open on mobile */
    .sidebar-mobile-open .logo-text, 
    .sidebar-mobile-open .nav-text, 
    .sidebar-mobile-open .group-title { 
      display: block !important; 
    }
    .main-content { margin-left: 0 !important; }
    .search-bar { display: none; }
    .mobile-toggle-btn { display: block !important; }
    .page-container { padding: 16px; }
  }

  .mobile-toggle-btn {
    display: none;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-main);
    padding: 8px;
    margin-right: 12px;
  }
</style>
