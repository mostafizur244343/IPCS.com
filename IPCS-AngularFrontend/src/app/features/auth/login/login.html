<!--  
  Login Screen UI 
  Main login page of the application using custom CSS for a premium design.
-->
<div class="login-container">
  <div class="login-card animate-fade-in">
    <!-- Logo and Title Section -->
    <div class="logo-section">
      <div class="logo-icon">
        <!-- SVG icon included directly to minimize external dependencies -->
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 2a2 2 0 0 0-2 2v5H4a2 2 0 0 0-2 2v2c0 1.1.9 2 2 2h5v5c0 1.1.9 2 2 2h2a2 2 0 0 0 2-2v-5h5a2 2 0 0 0 2-2v-2a2 2 0 0 0-2-2h-5V4a2 2 0 0 0-2-2h-2z"/></svg>
      </div>
      <h1>PharmaCare</h1>
      <p>Inventory Management System</p>
    </div>

    <!-- Highlighted Test Credentials Note -->
    <div class="test-credentials-note">
      <strong>NOTE: For system testing, please use these login credentials:</strong>
      <div class="credentials-details">
        <span><strong>Email:</strong> superadmin@ipcs.com</span>
        <span><strong>Password:</strong> Admin@1234</span>
      </div>
    </div>

    <!-- Login Form -->
    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <!-- Username Input -->
      <div class="input-group">
        <label for="username">Email or Mobile Number</label>
        <input 
          type="text" 
          id="username" 
          name="emailOrMobile" 
          [(ngModel)]="loginData.emailOrMobile" 
          placeholder="Enter email or mobile number"
          required
        >
      </div>

      <!-- Password Input -->
      <div class="input-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          [(ngModel)]="loginData.password" 
          placeholder="••••••••"
          required
        >
      </div>

      <!-- Error message displayed for invalid credentials -->
      <div class="error-msg" *ngIf="errorMsg">
        {{ errorMsg }}
      </div>

      <!-- Submit Button: Disabled while loading or if form is invalid -->
      <button type="submit" class="btn btn-primary w-full" [disabled]="isLoading || !loginForm.valid">
        <span *ngIf="!isLoading">Login to System</span>
        <!-- Loading Spinner -->
        <span *ngIf="isLoading" class="spinner"></span>
      </button>
    </form>

    <div class="footer-links">
      <a href="#">Forgot Password?</a>
    </div>
  </div>
</div>

<style>
  /* 
    Component Specific Styles (CSS)
    Specific styling for the login page.
  */
  .login-container {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0f766e 0%, #134e4a 100%); /* Gradient background */
    overflow: hidden;
    position: relative;
    font-family: sans-serif;
  }

  /* Decorative circle in the background */
  .login-container::before {
    content: '';
    position: absolute;
    width: 600px;
    height: 600px;
    background: rgba(45, 212, 191, 0.1);
    border-radius: 50%;
    top: -100px;
    right: -100px;
  }

  .login-card {
    background: white;
    padding: 42px 48px;
    border-radius: 24px;
    width: 100%;
    max-width: 440px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    z-index: 10;
  }

  .logo-section {
    text-align: center;
    margin-bottom: 24px;
  }

  .logo-icon {
    width: 64px;
    height: 64px;
    background: rgba(15, 118, 110, 0.1);
    color: #0f766e;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
  }

  .logo-section h1 {
    font-size: 28px;
    margin-bottom: 4px;
    color: #1e293b;
  }

  .logo-section p {
    color: #64748b;
    font-size: 14px;
    margin: 0;
  }

  /* Red Highlighted Note Styling */
  .test-credentials-note {
    background-color: #fef2f2;
    border: 2px dashed #dc2626;
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 24px;
    color: #dc2626;
    text-align: center;
    font-size: 13.5px;
    line-height: 1.5;
  }

  .credentials-details {
    margin-top: 8px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    font-size: 14px;
  }

  .input-group {
    margin-bottom: 20px;
  }

  .input-group label {
    display: block;
    font-size: 14px;
    font-weight: 600;
    color: #334155;
    margin-bottom: 8px;
  }

  .input-group input {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid #cbd5e1;
    border-radius: 8px;
    font-size: 15px;
    box-sizing: border-box;
    transition: border-color 0.2s;
  }

  .input-group input:focus {
    outline: none;
    border-color: #0f766e;
  }

  .btn-primary {
    background: #0f766e;
    color: white;
    border: none;
    padding: 14px;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .btn-primary:hover:not(:disabled) {
    background: #115e59;
  }

  .btn-primary:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  .w-full {
    width: 100%;
  }

  .error-msg {
    background: #fef2f2;
    color: #b91c1c;
    padding: 12px;
    border-radius: 8px;
    font-size: 14px;
    margin-bottom: 16px;
    text-align: center;
    border: 1px solid #fee2e2;
  }

  .footer-links {
    margin-top: 24px;
    text-align: center;
  }

  .footer-links a {
    color: #64748b;
    font-size: 14px;
    text-decoration: none;
    transition: color 0.2s;
  }

  .footer-links a:hover {
    color: #0f766e;
  }

  .spinner {
    width: 20px;
    height: 20px;
    border: 2px solid rgba(255, 255, 255, 0.3);
    border-radius: 50%;
    border-top-color: white;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
