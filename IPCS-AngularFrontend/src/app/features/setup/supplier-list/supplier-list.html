<div class="setup-container animate-fade-in">
  <div class="page-header">
    <div class="title-section">
      <h1>Suppliers / Distributors</h1>
      <p>Manage pharmaceutical supply chain partners and contact points.</p>
    </div>
  </div>

  <div class="setup-grid">
    <div class="card form-card">
      <h3>Add Supplier</h3>
      <div class="input-group">
        <label>Supplier Name *</label>
        <input type="text" [(ngModel)]="newSupplier.supplierName" placeholder="e.g. Acme Pharma">
      </div>
      <div class="input-group">
        <label>Contact Person</label>
        <input type="text" [(ngModel)]="newSupplier.contactPerson" placeholder="Name">
      </div>
      <div class="input-group">
        <label>Phone</label>
        <input type="text" [(ngModel)]="newSupplier.phone" placeholder="Contact number">
      </div>
      <button class="btn btn-primary w-full" (click)="addSupplier()" [disabled]="isLoading">
        <span *ngIf="!isLoading">Save Supplier</span>
      </button>
    </div>

    <div class="card table-card">
      <div *ngIf="isLoading" class="loading-state"><div class="spinner-blue"></div></div>
      <table *ngIf="!isLoading" class="data-table">
        <thead>
          <tr>
            <th>Company Name</th>
            <th>Contact</th>
            <th>Phone</th>
            <th class="text-right">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let s of suppliers">
            <td><strong>{{ s.supplierName }}</strong></td>
            <td>{{ s.contactPerson || '-' }}</td>
            <td>{{ s.phone || '-' }}</td>
            <td class="text-right">
              <button class="icon-btn delete" (click)="deleteSupplier(s.supplierId)">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<style>
  .setup-grid { display: grid; grid-template-columns: 320px 1fr; gap: 24px; }
  .text-right { text-align: right; }
</style>
