<div class="setup-container animate-fade-in">
  <!-- Page Header -->
  <div class="page-header">
    <div class="title-section">
      <h1>Manufacturers</h1>
      <p>Manage pharmaceutical companies and manufacturing partners.</p>
    </div>
  </div>

  <div class="setup-grid">
    <!-- Left: Add New Manufacturer -->
    <div class="card form-card">
      <h3>Add Manufacturer</h3>
      <div class="input-group">
        <label>Company Name *</label>
        <input type="text" [(ngModel)]="newManufacturer.manufacturerName" placeholder="e.g. Pfizer">
      </div>
      <div class="input-group">
        <label>Contact Person</label>
        <input type="text" [(ngModel)]="newManufacturer.contactPerson" placeholder="Name">
      </div>
      <div class="input-group">
        <label>Phone</label>
        <input type="text" [(ngModel)]="newManufacturer.phone" placeholder="Phone number">
      </div>
      <button class="btn btn-primary w-full" (click)="addManufacturer()" [disabled]="isLoading">
        <span *ngIf="!isLoading">Save Manufacturer</span>
        <span *ngIf="isLoading" class="spinner"></span>
      </button>
    </div>

    <!-- Right: Manufacturers Table -->
    <div class="card table-card">
      <div *ngIf="isLoading" class="loading-state">
        <div class="spinner-blue"></div>
      </div>

      <table *ngIf="!isLoading" class="data-table">
        <thead>
          <tr>
            <th>Company</th>
            <th>Contact</th>
            <th>Phone</th>
            <th class="text-right">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let m of manufacturers">
            <td><strong>{{ m.manufacturerName }}</strong></td>
            <td>{{ m.contactPerson || '-' }}</td>
            <td>{{ m.phone || '-' }}</td>
            <td class="text-right">
              <div class="action-buttons">
                <button class="icon-btn delete" (click)="deleteManufacturer(m.manufacturerId)" title="Delete">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<style>
  /* 
    Manufacturer Setup Specific Styles (CSS)
  */
  .setup-container { padding-bottom: 40px; }
  .setup-grid { display: grid; grid-template-columns: 320px 1fr; gap: 24px; }
  .form-card { padding: 24px; height: fit-content; }
  .form-card h3 { font-size: 16px; margin-bottom: 20px; }
  .w-full { width: 100%; margin-top: 10px; }
  .text-right { text-align: right; }
  .action-buttons { display: flex; gap: 8px; justify-content: flex-end; }
  
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
