<div class="setup-container animate-fade-in">
  <div class="page-header">
    <div class="title-section">
      <h1>Customer Management</h1>
      <p>Manage customer profiles, contact info and credit balances.</p>
    </div>
  </div>

  <div class="setup-grid">
    <div class="card form-card">
      <h3>Register Customer</h3>
      <div class="input-group">
        <label>Full Name *</label>
        <input type="text" [(ngModel)]="newCustomer.name" placeholder="Customer Name">
      </div>
      <div class="input-group">
        <label>Phone Number</label>
        <input type="text" [(ngModel)]="newCustomer.phone" placeholder="Contact number">
      </div>
      <div class="input-group">
        <label>Advance Balance</label>
        <input type="number" [(ngModel)]="newCustomer.initialBalance" placeholder="0.00">
      </div>
      <button class="btn btn-primary w-full" (click)="addCustomer()" [disabled]="isLoading">
        <span *ngIf="!isLoading">Save Customer</span>
      </button>
    </div>

    <div class="card table-card">
      <div *ngIf="isLoading" class="loading-state"><div class="spinner-blue"></div></div>
      <table *ngIf="!isLoading" class="data-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Phone</th>
            <th>Credit/Advance</th>
            <th class="text-right">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let c of customers">
            <td><strong>{{ c.name }}</strong></td>
            <td>{{ c.phone || '-' }}</td>
            <td>
              <span class="balance-badge" [class.positive]="c.advanceBalance > 0">
                ৳{{ c.advanceBalance | number:'1.2-2' }}
              </span>
            </td>
            <td class="text-right">
              <div class="action-buttons">
                <!-- Ledger Button -->
                <button class="icon-btn" [routerLink]="['/dashboard/setup/customer-ledger', c.customerId]" title="View Statement">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                </button>
                <!-- Delete Button -->
                <button class="icon-btn delete" (click)="deleteCustomer(c.customerId)" title="Delete Customer">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<style>
  .setup-grid { display: grid; grid-template-columns: 320px 1fr; gap: 24px; }
  .balance-badge { font-weight: 600; color: #64748b; }
  .balance-badge.positive { color: var(--success); }
  .text-right { text-align: right; }
</style>
