<div class="setup-container animate-fade-in">
  <div class="page-header">
    <div class="title-section">
      <h1>Unit Conversions</h1>
      <p>Define how many small units are in a large unit (e.g., 10 Pieces in 1 Strip).</p>
    </div>
  </div>

  <div class="setup-grid">
    <!-- Form Card -->
    <div class="card form-card">
      <h3>Add Rule</h3>
      <div class="input-group">
        <label>Product *</label>
        <select [(ngModel)]="newConversion.productId">
          <option *ngFor="let p of products" [value]="p.productId">{{ p.productName }}</option>
        </select>
      </div>
      <div class="input-group">
        <label>From Unit (Large) *</label>
        <select [(ngModel)]="newConversion.fromUomId">
          <option *ngFor="let u of units" [value]="u.uomId">{{ u.uomName }}</option>
        </select>
      </div>
      <div class="input-group">
        <label>To Unit (Small) *</label>
        <select [(ngModel)]="newConversion.toUomId">
          <option *ngFor="let u of units" [value]="u.uomId">{{ u.uomName }}</option>
        </select>
      </div>
      <div class="input-group">
        <label>Factor (e.g. 10) *</label>
        <input type="number" [(ngModel)]="newConversion.conversionFactor">
      </div>
      <button class="btn btn-primary w-full" (click)="addConversion()" [disabled]="isLoading">Save Rule</button>
    </div>

    <!-- Table Card -->
    <div class="card table-card">
      <div *ngIf="isLoading" class="loading-state"><div class="spinner-blue"></div></div>
      <table *ngIf="!isLoading" class="data-table">
        <thead>
          <tr>
            <th>Product</th>
            <th>Conversion Rule</th>
            <th class="text-right">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let c of conversions">
            <td><strong>{{ c.productName }}</strong></td>
            <td>1 {{ c.fromUomName }} = {{ c.conversionFactor }} {{ c.toUomName }}</td>
            <td class="text-right">
              <button class="icon-btn delete" (click)="deleteConversion(c.id)">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<style>
  .setup-grid { display: grid; grid-template-columns: 320px 1fr; gap: 24px; }
  .text-right { text-align: right; }
</style>
