<div class="setup-container animate-fade-in">
  <div class="page-header">
    <div class="title-section">
      <h1>Store Locations</h1>
      <p>Manage shelves, refrigerators, and other physical storage areas.</p>
    </div>
  </div>

  <div class="setup-grid">
    <div class="card form-card">
      <h3>Add Location</h3>
      <div class="input-group">
        <label>Location Name *</label>
        <input type="text" [(ngModel)]="newLocation.locationName" placeholder="e.g. Shelf A-1">
      </div>
      <div class="input-group">
        <label>Description</label>
        <textarea [(ngModel)]="newLocation.description" placeholder="Optional notes..."></textarea>
      </div>
      <button class="btn btn-primary w-full" (click)="addLocation()" [disabled]="isLoading">
        <span *ngIf="!isLoading">Save Location</span>
      </button>
    </div>

    <div class="card table-card">
      <div *ngIf="isLoading" class="loading-state"><div class="spinner-blue"></div></div>
      <table *ngIf="!isLoading" class="data-table">
        <thead>
          <tr>
            <th>Location Name</th>
            <th>Description</th>
            <th class="text-right">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let loc of locations">
            <td><strong>{{ loc.locationName }}</strong></td>
            <td>{{ loc.description || '-' }}</td>
            <td class="text-right">
              <button class="icon-btn delete" (click)="deleteLocation(loc.locationId)">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<style>
  .setup-grid { display: grid; grid-template-columns: 320px 1fr; gap: 24px; }
  textarea { width: 100%; height: 80px; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; outline: none; }
  .text-right { text-align: right; }
</style>
