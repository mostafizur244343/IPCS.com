<div class="setup-container animate-fade-in">
  <div class="page-header">
    <div class="title-section">
      <h1>Units of Measurement (UOM)</h1>
      <p>Define units for stock keeping and sales (e.g. Pcs, Box, Strip).</p>
    </div>
  </div>

  <div class="setup-grid">
    <div class="card form-card">
      <h3>Add Unit</h3>
      <div class="input-group">
        <label>Unit Name *</label>
        <input type="text" [(ngModel)]="newUom.uomName" placeholder="e.g. Pieces">
      </div>
      <div class="input-group">
        <label>Abbreviation *</label>
        <input type="text" [(ngModel)]="newUom.uomAbbreviation" placeholder="e.g. Pcs">
      </div>
      <button class="btn btn-primary w-full" (click)="addUom()" [disabled]="isLoading">
        <span *ngIf="!isLoading">Save Unit</span>
      </button>
    </div>

    <div class="card table-card">
      <div *ngIf="isLoading" class="loading-state"><div class="spinner-blue"></div></div>
      <table *ngIf="!isLoading" class="data-table">
        <thead>
          <tr>
            <th>Unit Name</th>
            <th>Abbreviation</th>
            <th class="text-right">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let u of uoms">
            <td><strong>{{ u.uomName }}</strong></td>
            <td>{{ u.uomAbbreviation }}</td>
            <td class="text-right">
              <button class="icon-btn delete" (click)="deleteUom(u.uomId)">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<style>
  .setup-grid { display: grid; grid-template-columns: 320px 1fr; gap: 24px; }
  .text-right { text-align: right; }
</style>
